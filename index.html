<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>

    <!-- Mode Toggle -->
    <div class="mode">
        <i class="fa-solid fa-moon"></i>
        <p>Light</p>
    </div>

    <!-- MAIN WRAPPER (NEW) -->
    <div class="main-wrapper">

        <!-- CONVERTER -->
        <div class="container">
            <h2>CURRENCY CONVERTER 💱</h2>

            <form>
                <div class="amount">
                    <p>Enter amount</p>
                    <input placeholder="Enter amount" type="number">
                </div>

                <div class="dropdown">
                    <div class="from">
                        <p>From</p>
                        <div class="select-container">
                            <img src="https://flagsapi.com/US/flat/64.png">
                            <select name="from"></select>
                        </div>
                    </div>

                    <!-- Swap -->
                    <i class="fa-solid fa-arrow-right-arrow-left swap"></i>

                    <div class="to">
                        <p>To</p>
                        <div class="select-container">
                            <img src="https://flagsapi.com/IN/flat/64.png">
                            <select name="to"></select>
                        </div>
                    </div>
                </div>

                <!-- Result -->
                <div class="msg">
                    <span class="text">Loading live rate...</span>
                    <span class="loader hidden"></span>
                </div>

                <button>Get Exchange Rate</button>
            </form>
        </div>

        <!-- DEVELOPER CARD (RECTANGLE + SMALLER) -->
        <div class="dev-card">
            <h3>About Developer</h3>

            <a href="img.jpeg" target="_main"><img src="img.jpeg" alt="Developer" class="dev-img"></a>

            <p class="dev-name">Paras Jadaun</p>

            <p class="email">
                <i class="fa-solid fa-envelope"></i>
                paras.jadaun.thakur@gmail.com
            </p>

            <div class="social-icons">
                <a href="https://www.instagram.com/paras.jadaun.0001?igsh=MTFyMTkyOTA3MTdyZw==" target="_main"><i class="fa-brands fa-instagram"></i></a>
                <a href="https://www.facebook.com/paras.jadaun.0001/" target="_main"><i class="fa-brands fa-facebook"></i></a>
                <a href="https://www.linkedin.com/in/paras-jadaun-60a92439a" target="_main"><i class="fa-brands fa-linkedin"></i></a>
            </div>
        </div>

    </div>

    <script src="code.js"></script>
    <script src="app.js"></script>
</body>
</html>
